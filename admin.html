<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Paneli - HyperCube Studio Forum</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .admin-header {
            background: linear-gradient(135deg, var(--primary-start) 0%, var(--primary-end) 100%);
            color: white;
            padding: 2rem;
            border-radius: 16px;
            margin-bottom: 2rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--bg-primary);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px var(--shadow);
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-start);
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem;
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 0.5rem;
        }
        
        .admin-comment-item {
            background: var(--bg-primary);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            box-shadow: 0 2px 4px var(--shadow);
        }
        
        .comment-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .comment-app-tag {
            display: inline-block;
            background: var(--primary-start);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }
        
        .comment-text {
            color: var(--text-primary);
            margin-bottom: 1rem;
            line-height: 1.6;
        }
        
        .admin-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn-sm {
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
        }
        
        .section {
            background: var(--bg-primary);
            padding: 2rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px var(--shadow);
        }
        
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Back Button -->
        <a href="index.html" class="back-btn" style="margin-bottom: 2rem; display: inline-flex;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
            Ana Sayfaya Dön
        </a>
        
        <!-- Admin Header -->
        <div class="admin-header">
            <h1>🛡️ Admin Paneli</h1>
            <p>Yorum yönetimi ve istatistikler</p>
        </div>
        
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Toplam Yorum</div>
                <div class="stat-value" id="totalComments">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Uygulama Dağılımı</div>
                <div id="appBreakdown"></div>
            </div>
        </div>
        
        <!-- Comments List -->
        <div class="section">
            <h2 class="section-title">📝 Tüm Yorumlar</h2>
            <div id="allCommentsList">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- Scripts -->
    <script type="module">
        import { firebaseConfig } from './js/config.js';
        import { initAuth } from './js/auth.js';
        import { initFirestore } from './js/forum.js';
        import { loadAdminStats } from './js/admin.js';
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        
        // Initialize modules
        initAuth();
        initFirestore();
        
        // Wait for auth state
        firebase.auth().onAuthStateChanged((user) => {
            if (user && user.email === 'studio@hypercube.tr') {
                // User is admin
                loadAdminStats();
            } else {
                // Not admin, redirect
                window.location.href = 'index.html';
            }
        });
        
        // Dark mode
        const isDarkMode = localStorage.getItem('darkMode') === 'true';
        if (isDarkMode) {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
