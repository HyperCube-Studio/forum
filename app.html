<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uygulama - HyperCube Studio Forum</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo-section">
                <img src="assets/logo.svg" alt="HyperCube Studio" class="logo">
                <div>
                    <h1 class="site-title" data-i18n="siteTitle">HyperCube Studio</h1>
                    <p class="site-subtitle" data-i18n="siteSubtitle">Mobil Oyun ve Uygulama Forumu</p>
                </div>
            </div>
            
            <div class="header-actions">
                <!-- Language Switcher -->
                <div class="lang-switcher">
                    <button class="lang-btn active" data-lang="tr">TR</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
                
                <!-- Dark Mode Toggle -->
                <button class="dark-mode-toggle" id="darkModeToggle" title="Dark Mode">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                
                <!-- Sign In Button -->
                <button class="btn btn-primary" id="signInBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span data-i18n="signIn">Google ile Giriş</span>
                </button>
                
                <!-- User Profile -->
                <div class="user-profile" id="userProfile" style="display: none;">
                    <img src="" alt="User" class="user-avatar" id="userAvatar">
                    <span class="user-name" id="userName"></span>
                    <button class="btn btn-secondary" id="signOutBtn">
                        <span data-i18n="signOut">Çıkış Yap</span>
                    </button>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="container">
        <a href="index.html" class="back-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
            <span data-i18n="backToHome">Ana Sayfaya Dön</span>
        </a>
        
        <!-- App Header -->
        <div class="app-header" id="appHeader">
            <div class="app-header-top">
                <div class="app-icon" id="appIcon">🎮</div>
                <div style="flex: 1;">
                    <h2 class="app-name" id="appName">Uygulama</h2>
                    <p class="app-description" id="appDescription"></p>
                </div>
            </div>
            <p id="appDetailedDescription" style="color: var(--text-secondary); line-height: 1.6;"></p>
            <div class="app-download-links">
                <a href="#" class="download-btn" id="playStoreLink" style="display: none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.53,12.9 20.18,13.18L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z"/>
                    </svg>
                    <span>Play Store</span>
                </a>
                <a href="#" class="download-btn" id="appStoreLink" style="display: none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18.71,19.5C17.88,20.74 17,21.95 15.66,21.97C14.32,22 13.89,21.18 12.37,21.18C10.84,21.18 10.37,21.95 9.1,22C7.79,22.05 6.8,20.68 5.96,19.47C4.25,17 2.94,12.45 4.7,9.39C5.57,7.87 7.13,6.91 8.82,6.88C10.1,6.86 11.32,7.75 12.11,7.75C12.89,7.75 14.37,6.68 15.92,6.84C16.57,6.87 18.39,7.1 19.56,8.82C19.47,8.88 17.39,10.1 17.41,12.63C17.44,15.65 20.06,16.66 20.09,16.67C20.06,16.74 19.67,18.11 18.71,19.5M13,3.5C13.73,2.67 14.94,2.04 15.94,2C16.07,3.17 15.6,4.35 14.9,5.19C14.21,6.04 13.07,6.7 11.95,6.61C11.8,5.46 12.36,4.26 13,3.5Z"/>
                    </svg>
                    <span>App Store</span>
                </a>
            </div>
        </div>
        
        <!-- Comments Section -->
        <div class="comments-section">
            <div class="comments-header">
                <h3 class="comments-title" data-i18n="commentsTitle">Yorumlar</h3>
                <div class="comments-controls">
                    <div class="search-box">
                        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                        <input type="text" class="search-input" id="searchComments" data-i18n="searchPlaceholder" placeholder="Yorumlarda ara...">
                    </div>
                    <select class="sort-select" id="sortComments">
                        <option value="newest" data-i18n="sortNewest">En Yeni</option>
                        <option value="popular" data-i18n="sortPopular">En Popüler</option>
                    </select>
                </div>
            </div>
            
            <!-- Sign In Required Message -->
            <div id="signInRequired" style="display: none; text-align: center; padding: 2rem; background: var(--bg-secondary); border-radius: 12px; margin-bottom: 1.5rem;">
                <p style="color: var(--text-secondary); margin-bottom: 1rem;" data-i18n="signInRequired">Yorum yazmak için giriş yapmalısınız</p>
                <button class="btn btn-primary" onclick="document.getElementById('signInBtn').click()">
                    <span data-i18n="signIn">Google ile Giriş</span>
                </button>
            </div>
            
            <!-- Comment Form -->
            <div class="comment-form" id="commentForm" style="display: none;">
                <textarea id="commentText" class="comment-textarea" data-i18n="writeComment" placeholder="Yorumunuzu yazın..." maxlength="2000"></textarea>
                <div class="comment-form-actions">
                    <div class="char-count" id="charCount">2000 <span data-i18n="charactersLeft">karakter kaldı</span></div>
                    <div class="form-buttons">
                        <button class="btn btn-success" id="sendCommentBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                            <span data-i18n="send">Gönder</span>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Comments List -->
            <div class="comments-list" id="commentsList">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>© 2026 HyperCube Studio - Tüm Hakları Saklıdır</p>
        </div>
    </footer>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- Scripts -->
    <script type="module">
        import { firebaseConfig } from './js/config.js';
        import { initAuth, setupAuthListeners } from './js/auth.js';
        import { initFirestore, loadAppsData, getAppById } from './js/forum.js';
        import { initI18n, currentLang, updateUI } from './js/i18n.js';
        import { initComments } from './js/comments.js';
        import './js/reactions.js';
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        
        // Initialize modules
        initAuth();
        initFirestore();
        initI18n();
        setupAuthListeners();
        
        // Get app ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const appId = urlParams.get('id');
        
        if (!appId) {
            window.location.href = 'index.html';
        }
        
        // Make updateUI global for comments.js
        window.updateUI = updateUI;
        
        // Load app data
        loadAppsData().then(() => {
            const app = getAppById(appId);
            if (!app) {
                window.location.href = 'index.html';
                return;
            }
            
            // Update UI with app data
            document.getElementById('appIcon').textContent = app.icon;
            document.getElementById('appName').textContent = app.name;
            document.getElementById('appDescription').textContent = app.description[currentLang];
            document.getElementById('appDetailedDescription').textContent = app.detailedDescription[currentLang];
            document.title = `${app.name} - HyperCube Studio Forum`;
            
            // Update store links
            if (app.storeLinks.playStore !== '#') {
                const playStoreLink = document.getElementById('playStoreLink');
                playStoreLink.href = app.storeLinks.playStore;
                playStoreLink.style.display = 'inline-flex';
            }
            
            if (app.storeLinks.appStore !== '#') {
                const appStoreLink = document.getElementById('appStoreLink');
                appStoreLink.href = app.storeLinks.appStore;
                appStoreLink.style.display = 'inline-flex';
            }
            
            // Initialize comments
            initComments(appId);
        });
        
        // Dark mode toggle
        const darkModeToggle = document.getElementById('darkModeToggle');
        const isDarkMode = localStorage.getItem('darkMode') === 'true';
        
        if (isDarkMode) {
            document.body.classList.add('dark-mode');
        }
        
        darkModeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        });
    </script>
</body>
</html>
