<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer cube -->
  <path d="M100 20 L160 60 L160 140 L100 180 L40 140 L40 60 Z" 
        fill="url(#grad)" opacity="0.8"/>
  
  <!-- Inner cube -->
  <path d="M100 60 L130 80 L130 120 L100 140 L70 120 L70 80 Z" 
        fill="white" opacity="0.9"/>
  
  <!-- Lines -->
  <line x1="100" y1="20" x2="100" y2="60" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="160" y1="60" x2="130" y2="80" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="160" y1="140" x2="130" y2="120" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="180" x2="100" y2="140" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="40" y1="140" x2="70" y2="120" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="40" y1="60" x2="70" y2="80" stroke="white" stroke-width="2" opacity="0.5"/>
  
  <!-- Center dot -->
  <circle cx="100" cy="100" r="8" fill="url(#grad)"/>
</svg>
