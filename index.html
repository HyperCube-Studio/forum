<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperCube Studio Forum</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo-section">
                <img src="assets/forum.png" alt="HyperCube Studio" class="logo" style="width: auto; height: 130px;">
            </div>
            
            <div class="header-actions">
                <!-- Language Switcher -->
                <div class="lang-switcher">
                    <button class="lang-btn active" data-lang="tr">TR</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
                
                <!-- Dark Mode Toggle -->
                <button class="dark-mode-toggle" id="darkModeToggle" title="Dark Mode">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                
                <!-- Sign In Button -->
                <button class="btn btn-primary" id="signInBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span data-i18n="signIn">Google ile Giriş</span>
                </button>
                
                <!-- User Profile -->
                <div class="user-profile" id="userProfile" style="display: none;">
                    <img src="" alt="User" class="user-avatar" id="userAvatar">
                    <span class="user-name" id="userName"></span>
                    <button class="btn btn-secondary" id="signOutBtn">
                        <span data-i18n="signOut">Çıkış Yap</span>
                    </button>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="container">
        <h2 style="text-align: center; margin-bottom: 2rem; font-size: 2rem;">🎮 Uygulamalarımız</h2>
        
        <!-- Apps Grid -->
        <div class="apps-grid" id="appsGrid">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </main>
    
    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>© 2026 HyperCube Studio - Tüm Hakları Saklıdır</p>
        </div>
    </footer>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- Scripts -->
    <script type="module">
        import { firebaseConfig } from './js/config.js';
        import { initAuth, setupAuthListeners } from './js/auth.js';
        import { initFirestore, renderApps } from './js/forum.js';
        import { initI18n, updateUI } from './js/i18n.js';
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        
        // Initialize modules
        initAuth();
        initFirestore();
        initI18n();
        setupAuthListeners();
        
        // Make updateUI global for forum.js
        window.updateUI = updateUI;
        
        // Load apps
        renderApps();
        
        // Dark mode toggle
        const darkModeToggle = document.getElementById('darkModeToggle');
        const isDarkMode = localStorage.getItem('darkMode') === 'true';
        
        if (isDarkMode) {
            document.body.classList.add('dark-mode');
        }
        
        darkModeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        });
    </script>
</body>
</html>
